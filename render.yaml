# Blueprint do Render — crie via "New > Blueprint" apontando para este repositório
services:
  - type: web
    name: validade-brasilcacau
    runtime: python
    plan: free            # troque para starter se quiser evitar o "sleep" do plano grátis
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: validade-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CRON_TOKEN
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false        # defina no painel
      - key: ADMIN_SENHA
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: validade-db
    plan: free
