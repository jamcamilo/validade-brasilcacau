# Blueprint do Render — crie via "New > Blueprint" apontando para este repositório
services:
  - type: web
    name: validade-brasilcacau
    runtime: python
    plan: free            # troque para starter se quiser evitar o "sleep" do plano grátis
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: validade-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CRON_TOKEN
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false        # defina no painel
      - key: ADMIN_SENHA
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  - type: cron
    name: validade-alertas
    runtime: python
    plan: free
    schedule: "0 11 * * *"   # 11:00 UTC = 08:00 em Brasília
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import os,requests; r=requests.get(os.environ['URL_ALERTAS'], timeout=300); print(r.status_code, r.text[:500])"
    envVars:
      - key: URL_ALERTAS
        sync: false        # ex.: https://validade-brasilcacau.onrender.com/tasks/enviar-alertas?token=SEU_CRON_TOKEN

databases:
  - name: validade-db
    plan: free
